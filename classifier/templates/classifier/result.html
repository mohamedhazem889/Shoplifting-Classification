<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shoplifting Classifier – Result</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,.1);
      max-width: 520px;
      width: 100%;
      padding: 2.5rem;
      text-align: center;
    }
    h1 { font-size: 1.6rem; color: #1a202c; margin-bottom: 1.5rem; }
    .verdict {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: .5rem;
    }
    .verdict.positive { color: #e53e3e; }   /* shoplifter  */
    .verdict.negative { color: #38a169; }   /* non-shoplifter */
    .filename { color: #718096; font-size: .9rem; margin-bottom: 1.8rem; }
    .prob-bar-wrap {
      background: #e2e8f0;
      border-radius: 9999px;
      height: 14px;
      overflow: hidden;
      margin-bottom: .4rem;
    }
    .prob-bar {
      height: 100%;
      border-radius: 9999px;
      transition: width .6s ease;
    }
    .prob-bar.positive { background: #e53e3e; }
    .prob-bar.negative { background: #38a169; }
    .prob-label { font-size: .85rem; color: #4a5568; margin-bottom: 2rem; }
    .btn {
      display: inline-block;
      padding: .65rem 1.6rem;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }
    .btn:hover { background: #2b6cb0; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔍 Classification Result</h1>

    <p class="filename">File: <strong>{{ filename }}</strong></p>

    <div class="verdict {% if label == 1 %}positive{% else %}negative{% endif %}">
      {% if label == 1 %}🚨{% else %}✅{% endif %}
      {{ class_name }}
    </div>

    <p style="color:#718096;font-size:.85rem;margin:.4rem 0 1.4rem;">
      Shoplifter probability: {{ probability|floatformat:4 }}
    </p>

    <div class="prob-bar-wrap">
      <div
        class="prob-bar {% if label == 1 %}positive{% else %}negative{% endif %}"
        style="width: {% widthratio probability 1 100 %}%"
      ></div>
    </div>

    <a href="{% url 'classifier:upload' %}" class="btn">Classify another video</a>
  </div>
</body>
</html>
