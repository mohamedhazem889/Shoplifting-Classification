<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classification Result – Shoplifting Classifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      padding: 40px 48px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    h1 { font-size: 1.5rem; color: #1a1a2e; margin-bottom: 28px; }
    .verdict {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .verdict.danger  { color: #dc2626; }
    .verdict.safe    { color: #16a34a; }
    .confidence {
      font-size: 1rem;
      color: #555;
      margin-bottom: 28px;
    }
    .bar-wrap {
      background: #e5e7eb;
      border-radius: 999px;
      height: 12px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .6s ease;
    }
    .bar-fill.danger { background: #dc2626; }
    .bar-fill.safe   { background: #16a34a; }
    a.btn {
      display: inline-block;
      padding: 12px 28px;
      background: #7c3aed;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background .2s;
    }
    a.btn:hover { background: #6d28d9; }
    .icon { font-size: 3rem; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🛒 Classification Result</h1>

    {% if label == "Shoplifting" %}
      <div class="icon">🚨</div>
      <div class="verdict danger">{{ label }}</div>
    {% else %}
      <div class="icon">✅</div>
      <div class="verdict safe">{{ label }}</div>
    {% endif %}

    <div class="confidence">Confidence: {{ confidence_pct }}%</div>

    <div class="bar-wrap">
      <div
        class="bar-fill {% if label == 'Shoplifting' %}danger{% else %}safe{% endif %}"
        style="width: {{ confidence_pct }}%"
      ></div>
    </div>

    <a href="{% url 'classifier:index' %}" class="btn">← Analyse Another Video</a>
  </div>
</body>
</html>
