version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Mount your trained weights into the container
      - ./r3d_best_finetuned.pt:/app/r3d_best_finetuned.pt:ro
      # Persist uploaded media (optional)
      - media_data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=shoplifting_api.settings
      - MODEL_PATH=/app/r3d_best_finetuned.pt
    restart: unless-stopped

volumes:
  media_data:
